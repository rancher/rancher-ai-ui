name: E2E Shortcuts Runner

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number containing the spec to test (auto-detected if empty)"
        required: false
        type: string
        default: ""
      attempt:
        description: "Attempt number for the test loop"
        required: false
        type: string
        default: "1"

env:
  RANCHER_VERSION: head
  CATTLE_SERVER_URL: https://172.17.0.1
  CATTLE_BOOTSTRAP_PASSWORD: password
  KUBECONFIG_PATH: ${{ github.workspace }}/kubeconfig.yaml
  DEV_UI_URL: https://localhost:8005

jobs:
  e2e-shortcuts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Resolve PR head ref
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.inputs.pr_number }}"
          if [ -z "$PR_NUM" ]; then
            echo "No PR number provided, finding latest e2e-shortcuts PR..."
            PR_NUM=$(gh pr list --repo ${{ github.repository }} \
              --label ai-e2e --state open --json number,headRefName \
              --jq '[.[] | select(.headRefName | startswith("test/e2e-shortcuts-spec"))] | sort_by(.number) | last | .number')
            if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
              echo "::error::Could not find an open e2e-shortcuts PR"
              exit 1
            fi
            echo "Auto-detected PR #$PR_NUM"
          fi
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          HEAD_REF=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json headRefName -q .headRefName)
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUM head ref: $HEAD_REF"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 1

      - name: Setup Node env
        uses: ./.github/actions/setup

      - name: Start Rancher
        run: .github/scripts/install-rancher.sh ${{ env.RANCHER_VERSION }} ${{ env.CATTLE_SERVER_URL }} ${{ env.CATTLE_BOOTSTRAP_PASSWORD }}

      - name: Deploy Rancher AI charts
        run: .github/scripts/deploy-rancher-ai.sh ${{ env.KUBECONFIG_PATH }}

      - name: Start dev UI
        env:
          API: ${{ env.CATTLE_SERVER_URL }}
        run: |
          nohup yarn dev > dev.log 2>&1 & echo $! > dev.pid

      - name: Wait for dev UI to be ready
        run: |
          npx wait-on ${{ env.DEV_UI_URL }}

      - name: Run Cypress tests
        id: cypress
        continue-on-error: true
        env:
          TEST_USERNAME: admin
          CATTLE_BOOTSTRAP_PASSWORD: ${{ env.CATTLE_BOOTSTRAP_PASSWORD }}
          API: ${{ env.CATTLE_SERVER_URL }}
        run: |
          set +e
          yarn e2e --browser chrome 2>&1 | tee cypress/results/cypress-output.txt
          CYPRESS_EXIT=$?
          echo "cypress_exit=$CYPRESS_EXIT" >> "$GITHUB_OUTPUT"
          # Check if all specs passed regardless of exit code
          if grep -q "All specs passed" cypress/results/cypress-output.txt; then
            echo "All specs passed — treating as success"
            exit 0
          fi
          exit $CYPRESS_EXIT

      - name: Save attempt metadata
        if: always()
        run: |
          mkdir -p cypress/results
          echo '{"attempt": ${{ github.event.inputs.attempt }}, "pr_number": "${{ steps.pr.outputs.pr_number }}", "outcome": "${{ steps.cypress.outcome }}"}' > cypress/results/metadata.json
          # If the output file doesn't exist (e.g. install failed), create an empty one
          touch cypress/results/cypress-output.txt

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shortcuts-results
          path: |
            cypress/screenshots/
            cypress/videos/
            cypress/results/
          retention-days: 7

      - name: Tear down background processes
        if: always()
        run: |
          if [ -f dev.pid ]; then kill $(cat dev.pid) || true; fi

      - name: Report outcome
        if: always()
        run: |
          echo "Cypress outcome: ${{ steps.cypress.outcome }}"
          echo "Attempt: ${{ github.event.inputs.attempt }}"
          echo "PR: #${{ steps.pr.outputs.pr_number }}"

      - name: Dispatch E2E Verifier
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run e2e-verifier.lock.yml \
            --repo ${{ github.repository }} \
            --ref e2e-agentic \
            -f pr_number="${{ steps.pr.outputs.pr_number }}" \
            -f attempt="${{ github.event.inputs.attempt }}" \
            -f runner_run_id="${{ github.run_id }}"
          echo "Dispatched E2E Verifier with run_id=${{ github.run_id }}"
